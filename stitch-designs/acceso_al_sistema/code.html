<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>

          darkMode: "class",

            extend: {

                "surface-container-highest": "#d8e2ff",

                "surface-bright": "#f9f9ff",
                "primary": "#144bdb",
                "on-primary-fixed-variant": "#0038b6",
                "primary-fixed-dim": "#b7c4ff",
                "on-background": "#071b3b",
                "on-tertiary-fixed": "#002113",
                "on-primary-fixed": "#001452",
                "primary-container": "#3b66f5",
                "on-primary": "#ffffff",
                "surface-dim": "#ccdaff",
                "on-secondary-container": "#4b5b7f",
                "on-secondary": "#ffffff",
                "on-tertiary": "#ffffff",
                "tertiary-fixed-dim": "#4edea3",
                "surface-variant": "#d8e2ff",
                "on-secondary-fixed": "#071b3b",
                "on-error": "#ffffff",
                "tertiary-container": "#00835a",
                "secondary-fixed-dim": "#b6c6f0",
                "on-surface-variant": "#434655",
                "on-primary-container": "#fbf8ff",
                "inverse-primary": "#b7c4ff",
                "outline": "#747686",
                "surface": "#f9f9ff",
                "surface-tint": "#1c4fe0",
                "secondary-fixed": "#d8e2ff",
                "on-error-container": "#93000a",

                "secondary": "#4e5e82",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .editorial-gradient {
            background: linear-gradient(135deg, #144bdb 0%, #3b66f5 100%);
        }
        .glass-overlay {
            background: rgba(31, 48, 81, 0.7);
            backdrop-blur: 8px;
        }
        .input-focus-ring:focus {
            border-bottom: 2px solid #144bdb;
            outline: none;
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface overflow-hidden">
<main class="flex min-h-screen">
<!-- Visual Section: Left Side (Desktop) -->
<section class="hidden lg:flex lg:w-3/5 relative overflow-hidden items-end p-20">
<div class="absolute inset-0 z-0">
<img alt="Padel Court" class="w-full h-full object-cover" data-alt="Cinematic wide shot of a luxury indoor padel court with bright blue turf and glass walls under dramatic spotlighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA3sPoT1snxddu4dlZoCEr8EKL5RgPMiIyVyZUYKS3wlK2kPa1FglWGaagmMjvSTzcsyrEw8Kfmxp7UPiljQYmrpt9LjDv84LOjbH4X-mkPPLB-wvcdK4o67-OuFB6j8R8h_lKX13UVCrSgxtgdD8T_ym-Wr96ChXc8N0_k_hHE-NWbsQ4MCHvCxRA4xre1cR_nCqy1V0bDq-YtLzH8kgjUM_dRuiGKNsuyYafkCSZBwvHOgW-OUnehjRnbJPQTSf51GboMkqTS_Kw"/>
<div class="absolute inset-0 bg-gradient-to-t from-inverse-surface via-inverse-surface/40 to-transparent"></div>
</div>
<div class="relative z-10 space-y-4">
<div class="flex flex-col">
<span class="text-white font-headline font-black text-6xl italic tracking-tighter leading-none">ST. GEORGE</span>
<span class="text-primary-container font-headline font-bold text-lg tracking-[0.3em] ml-1">ELITE PADEL</span>
</div>
<h1 class="text-white font-headline font-extrabold text-7xl tracking-tight leading-tight uppercase">
                    DOMINA<br/>LA PISTA
                </h1>
<div class="w-24 h-1.5 bg-primary-container rounded-full"></div>
</div>
</section>
<!-- Form Section: Right Side (Desktop) / Full Screen (Mobile) -->
<section class="w-full lg:w-2/5 flex flex-col justify-center bg-surface-container-lowest px-8 sm:px-16 lg:px-24 py-12 shadow-2xl z-20">
<div class="max-w-md w-full mx-auto space-y-10">
<!-- Mobile Branding -->
<div class="lg:hidden flex flex-col mb-8">
<span class="text-on-background font-headline font-black text-3xl italic tracking-tighter">ST. GEORGE</span>
<span class="text-primary font-headline font-bold text-xs tracking-widest uppercase">Elite Padel</span>
</div>
<div class="space-y-2">
<h2 class="text-on-surface font-headline font-bold text-3xl uppercase tracking-wide">Acceso Administrador</h2>
<p class="text-outline font-medium">Introduce tus credenciales para gestionar el club.</p>
</div>
<!-- Form -->
<form class="space-y-6">
<div class="space-y-1">
<label class="block text-xs font-label font-semibold text-on-surface-variant tracking-widest uppercase" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-outline-variant text-xl">alternate_email</span>
<input class="w-full bg-transparent border-0 border-b-2 border-surface-container-highest pl-8 py-3 font-medium text-on-surface placeholder:text-outline-variant transition-all input-focus-ring" id="email" name="email" placeholder="admin@stgeorgepadel.com" type="email"/>
</div>
</div>
<div class="space-y-1">
<div class="flex justify-between items-center">
<label class="block text-xs font-label font-semibold text-on-surface-variant tracking-widest uppercase" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:text-primary-container transition-colors uppercase tracking-wider" href="#">¿Olvidaste tu contraseña?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-outline-variant text-xl">lock_open</span>
<input class="w-full bg-transparent border-0 border-b-2 border-surface-container-highest pl-8 py-3 font-medium text-on-surface placeholder:text-outline-variant transition-all input-focus-ring" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-0 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<button class="w-full editorial-gradient text-white font-headline font-bold py-4 rounded-xl shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all uppercase tracking-widest" type="submit">
                        INICIAR SESIÓN
                    </button>
</form>
<!-- Divider -->
<div class="relative py-4">
<div class="absolute inset-0 flex items-center"><div class="w-full border-t border-surface-container-highest"></div></div>
<div class="relative flex justify-center text-xs uppercase tracking-widest font-label font-semibold bg-surface-container-lowest px-4 text-outline-variant">
                        O entrar con
                    </div>
</div>
<!-- Social Login -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 py-3 px-4 rounded-xl border-2 border-surface-container-high hover:bg-surface-container-low transition-colors group">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-semibold text-on-surface-variant uppercase tracking-wider">Google</span>
</button>
<button class="flex items-center justify-center gap-3 py-3 px-4 rounded-xl border-2 border-surface-container-high hover:bg-surface-container-low transition-colors group">
<svg class="w-5 h-5 fill-on-background" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.98.95-2.05 1.61-3.46 1.61-1.43 0-1.85-.88-3.59-.88-1.76 0-2.25.85-3.56.88-1.38.03-2.61-.79-3.66-2.26-2.14-3.03-1.64-7.79 1.12-10.33 1.36-1.25 2.97-1.95 4.51-1.95 1.6 0 2.51.87 3.96.87 1.39 0 2.06-.87 3.94-.87 1.25 0 2.53.53 3.53 1.48-2.6 1.48-2.18 5.22.42 6.5-1 2.37-2.3 4.02-3.27 4.95zM15.52 1.17c0 1.95-1.57 3.51-3.48 3.51-.23 0-.46-.02-.68-.07.05-1.95 1.61-3.55 3.48-3.55.25 0 .49.03.68.11z"></path>
</svg>
<span class="text-sm font-semibold text-on-surface-variant uppercase tracking-wider">Apple</span>
</button>
</div>
<div class="pt-8 text-center">
<p class="text-sm font-medium text-outline">
                        ¿No tienes acceso? <a class="text-primary font-bold hover:underline" href="#">Contacta con Soporte</a>
</p>
</div>
</div>
<!-- Footer Meta -->
<footer class="mt-auto pt-10 flex justify-between items-center text-[10px] font-label font-bold uppercase tracking-widest text-outline-variant">
<span>© 2024 ST. GEORGE ELITE PADEL</span>
<div class="flex gap-4">
<a class="hover:text-primary transition-colors" href="#">Privacidad</a>
<a class="hover:text-primary transition-colors" href="#">Términos</a>
</div>
</footer>
</section>
</main>
<!-- Decoration Layer -->
<div class="fixed top-0 right-0 w-64 h-64 editorial-gradient opacity-5 rounded-full blur-[120px] -mr-32 -mt-32 pointer-events-none"></div>
<div class="fixed bottom-0 left-0 w-96 h-96 bg-primary opacity-5 rounded-full blur-[150px] -ml-48 -mb-48 pointer-events-none"></div>
</body></html>
